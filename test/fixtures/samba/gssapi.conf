# Allow SASL GSSAPI bind without sign/seal security layer over TLS (LDAPS).
#
# By default (yes), Samba requires GSSAPI clients to negotiate a SASL
# security layer (sign or seal), even over TLS. But over TLS, Samba
# *refuses* sign/seal to avoid double encryption. Thus GSSAPI over LDAPS
# is impossible with the default.
#
# go-ldap GSSAPI client does not implement SASL security layers, so
# ldap2pg requires LDAPS for GSSAPI, like ldapsearch -O maxssf=0.
[global]
	ldap server require strong auth = allow_sasl_over_tls
